<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../maps.css">
</head>
<body>

<div id="galaxy_overview" class="map_container">
  <svg viewBox="0 0 1920 1080" style="cursor: default;">
    <defs>
      <clipPath id="galaxy_border"><rect x="20" y="20" width="80" height="80" rx="10" ry="10"/></clipPath>
      <marker id="arrowhead_sector_sector" markerWidth="10" markerHeight="40" refX="40" refY="5" orient="auto"><polygon points="0 0, 10 5, 0 10" fill="#00ff00"/></marker>
    </defs>

    <image href="Galaxy.jpg" width="1920" height="1080"/>
    
    <g class="connectors">
      <line x1="321" y1="152" x2="466" y2="524" stroke="#ffffff" stroke-width="2"/><!--Aethon - Union-->
      <line x1="82" y1="499" x2="466" y2="524" stroke="#ffffff" stroke-width="2"/><!--Drake - Union-->
      <line x1="306" y1="962" x2="466" y2="524" stroke="#ffffff" stroke-width="2"/><!--Ceto - Union-->
      <line x1="901" y1="478" x2="466" y2="524" stroke="#ffffff" stroke-width="2"/><!--Zharkov - Union-->
      <line x1="901" y1="478" x2="1452" y2="267" stroke="#ffffff" stroke-width="2"/><!--Zharkov - Ushak Sanctuary-->
      <line x1="901" y1="478" x2="952" y2="866" stroke="#ffffff" stroke-width="2"/><!--Zharkov - Khait Nebula-->
      <line x1="1326" y1="795" x2="952" y2="866" stroke="#ffffff" stroke-width="2"/><!--Khait Dominion - Khait Nebula-->
      <line x1="1326" y1="795" x2="1544" y2="538" stroke="#ffffff" stroke-width="2"/><!--Khait Dominion - Rhak Homeworlds-->
      <line x1="1452" y1="267" x2="1544" y2="538" stroke="#ffffff" stroke-width="2"/><!--Ushak Sanctuary - Rhak Homeworlds-->
    </g>
        
    <g data-system="aethon" class="overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="281" y="112" width="80" height="80" class="sector_img"/>
      <text x="321" y="206" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">AETHON</text>
    </g>
    <g data-system="khione" class="overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="698" y="100" width="80" height="80" class="sector_img"/>
      <text x="738" y="194" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">KHIONE</text>
    </g>
    <g data-system="drake" class="overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="42" y="459" width="80" height="80" class="sector_img"/>
      <text x="82" y="553" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">DRAKE</text>
    </g>
    <g data-system="union" class="overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="426" y="484" width="80" height="80" class="sector_img"/>
      <text x="466" y="578" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">UNION</text>
    </g>
    <g data-system="zharkov" class="overlay trans_center" onclick="parent.parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="861" y="438" width="80" height="80" class="sector_img"/>
      <text x="901" y="532" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">ZHARKOV</text>
    </g>
    <g data-system="ushak_sanctuary" class="overlay trans_center" onclick="parent.parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="1412" y="227" width="80" height="80" class="sector_img"/>
      <text x="1452" y="321" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">USHAK SANCTUARY</text>
    </g>
    <g data-system="ceto" class="overlay trans_center" onclick="parent.parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="266" y="922" width="80" height="80" class="sector_img"/>
      <text x="306" y="1016" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">CETO</text>
    </g>
    <g data-system="khait_nebula" class="overlay trans_center" onclick="parent.parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="912" y="826" width="80" height="80" class="sector_img"/>
      <text x="952" y="920" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">KHAÏT NEBULA</text>
    </g>
    <g data-system="khait_dominion" class="overlay trans_center" onclick="parent.parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="1286" y="755" width="80" height="80" class="sector_img"/>
      <text x="1326" y="849" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">KHAÏT DOMINION</text>
    </g>
    <g data-system="rhak_homeworlds" class="overlay trans_center" onclick="parent.parent.system_click(this);">
      <image href="../00_Pointers/Sector_Pointer.png" x="1504" y="498" width="80" height="80" class="sector_img"/>
      <text x="1544" y="592" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">RHAK HOMEWORLDS</text>
    </g>
  </svg>
</div>

<div class="map_texts">
  <div data-system="aethon" class="txt red____txt" onclick="parent.system_click(this);">AETHON</div>
  <div data-system="ceto" class="txt yellow_txt" onclick="parent.system_click(this);">CETO</div>
  <div data-system="drake" class="txt orange_txt" onclick="parent.system_click(this);">DRAKE</div>
  <div data-system="khait_dominion" class="txt yellow_txt" onclick="parent.system_click(this);">KHAÏT DOMINION</div>
  <div data-system="khait_nebula" class="txt yellow_txt" onclick="parent.system_click(this);">KHAÏT NEBULA</div>
  <div data-system="khione" class="txt green__txt" onclick="parent.system_click(this);">KHIONE</div>
  <div data-system="rhak_homeworlds" class="txt yellow_txt" onclick="parent.system_click(this);">RHAK HOMEWORLDS</div>
  <div data-system="union" class="txt blue___txt" onclick="parent.system_click(this);">UNION</div>
  <div data-system="ushak_sanctuary" class="txt yellow_txt" onclick="parent.system_click(this);">USHAK SANCTUARY</div>
  <div data-system="zharkov" class="txt yellow_txt" onclick="parent.system_click(this);">ZHARKOV</div>
</div>

</body>
</html>
<script src="../maps.js"></script>
