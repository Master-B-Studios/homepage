<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../maps.css">
</head>
<body>

<div id="galaxy_overview" class="map_container">
  <svg viewBox="0 0 1080 1080" style="cursor: default;">
    <defs>
      <clipPath id="galaxy_border"><rect x="20" y="20" width="80" height="80" rx="10" ry="10"/></clipPath>
      <clipPath id="ceto_border"><rect x="980" y="20" width="80" height="80" rx="10" ry="10"/></clipPath>
    </defs>

    <image href="ceto_union_bridge.jpg" width="1080" height="1080"/>
    
    <g data-system="galaxy" class="overlay trans_galaxy" onclick="parent.system_click(this);">
      <image href="../01_Galaxy/Galaxy_Overview.jpg" x="20" y="20" width="80" height="80" clip-path="url(#galaxy_border)"/>
      <rect x="20" y="20" width="80" height="80" rx="10" ry="10" fill="none" stroke="#dbdbdb" stroke-width="2"/>
    </g>
    <g data-system="ceto" class="overlay trans_sector" onclick="parent.system_click(this);">
      <image href="../02_Sectors/Ceto.jpg" x="980" y="20" width="80" height="80" clip-path="url(#ceto_border)"/>
      <rect x="980" y="20" width="80" height="80" rx="10" ry="10" fill="none" stroke="#dbdbdb" stroke-width="2"/>
    </g>

    <g class="trans_center system_header"><text x="540" y="70">CETO - UNION BRIDGE</text></g>
  </svg>
</div>

</body>
</html>
<script src="../maps.js"></script>
