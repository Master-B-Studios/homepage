<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../maps.css">
</head>
<body>

<div id="galaxy_overview" class="map_container">
  <svg viewBox="0 0 1080 1080" style="cursor: default;">
    <defs>
      <clipPath id="galaxy_border"><rect x="20" y="20" width="80" height="80" rx="10" ry="10"/></clipPath>
      <marker id="arrowhead_system" markerWidth="10" markerHeight="40" refX="40" refY="5" orient="auto"><polygon points="0 0, 10 5, 0 10" fill="#dbdbdb"/></marker>
      <marker id="arrowhead_sector_from" markerWidth="10" markerHeight="40" refX="24" refY="5" orient="auto"><polygon points="0 0, 10 5, 0 10" fill="#00ff00"/></marker>
      <marker id="arrowhead_sector_towa" markerWidth="10" markerHeight="40" refX="-24" refY="5" orient="auto"><polygon points="10 5, 0 0, 0 10" fill="#00ff00"/></marker>
    </defs>

    <image href="Sirius.jpg" width="1080" height="1080"/>
    <image href="Sirius-Sector.jpg" width="1080" height="1080"/>
    
    <g data-system="galaxy" class="planet overlay trans_galaxy" onclick="parent.system_click(this);">
      <image href="../01_Galaxy/Galaxy_Overview.jpg" x="20" y="20" width="80" height="80" clip-path="url(#galaxy_border)"/>
      <rect x="20" y="20" width="80" height="80" rx="10" ry="10" fill="none" stroke="#dbdbdb" stroke-width="2"/>
    </g>
    
    <g class="connectors">
      <line x1="130" y1="230" x2="46" y2="198" stroke="#dbdbdb" stroke-width="2"/>
      <line x1="46" y1="198" x2="114" y2="320" stroke="#ff0000" stroke-width="2" stroke-dasharray="8 6"/>
    </g>

    <g class="headers">
      <text x="540" y="80" font-size="50" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">Sirius Sector</text>
      <rect x="10" y="940" width="1060" height="130" fill="#000000" fill-opacity="0.6"/>

      <image href="../00_Pointers/Coalition_Faction.png" x="20" y="940" width="40" height="40"/>
      <text x="70" y="965" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Crossfire Systems</text>
      <image href="../00_Pointers/Coalition_Faction.png" x="290" y="940" width="40" height="40"/>
      <text x="340" y="965" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Kusari</text>
      <image href="../00_Pointers/Coalition_Faction.png" x="560" y="940" width="40" height="40"/>
      <text x="610" y="965" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Independent Worlds</text>
      <image href="../00_Pointers/Coalition_Faction.png" x="830" y="940" width="40" height="40"/>
      <text x="880" y="965" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Edge Worlds</text>

      <image href="../00_Pointers/Coalition_Faction.png" x="20" y="985" width="40" height="40"/>
      <text x="70" y="1010" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Unknown</text>
      <image href="../00_Pointers/Coalition_Faction.png" x="290" y="985" width="40" height="40"/>
      <text x="340" y="1010" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Hispania</text>
      <image href="../00_Pointers/Coalition_Faction.png" x="560" y="985" width="40" height="40"/>
      <text x="610" y="1010" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Rheinland</text>
      <image href="../00_Pointers/Coalition_Faction.png" x="830" y="985" width="40" height="40"/>
      <text x="880" y="1010" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Border Worlds</text>

      <image href="../00_Pointers/Coalition_Faction.png" x="20" y="1030" width="40" height="40"/>
      <text x="70" y="1055" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Bretonia</text>
      <image href="../00_Pointers/DomKavash_Faction.png" x="290" y="1030" width="40" height="40"/>
      <text x="340" y="1055" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Liberty</text>
      <image href="../00_Pointers/Nomads_Faction.png" x="560" y="1030" width="40" height="40"/>
      <text x="610" y="1055" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer">Hidden Systems</text>
      <image href="../00_Pointers/Coalition_Faction.png" x="830" y="1030" width="40" height="40"/>
      <text x="880" y="1055" font-size="14" text-anchor="left" fill="#dbdbdb" font-family="Freelancer"></text>
    </g>
    
    <g data-system="Hyperion" class="planet overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Coalition_System_Pointer.png" x="60" y="860" width="40" height="40"/>
      <text x="80" y="912" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">Hyperion</text>
    </g>
    <g data-system="Hyperion" class="planet overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Coalition_System_Pointer.png" x="120" y="860" width="40" height="40"/>
      <text x="260" y="912" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">Hyperion</text>
    </g>
    <g data-system="Hyperion" class="planet overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Coalition_System_Pointer.png" x="180" y="860" width="40" height="40"/>
      <text x="260" y="912" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">Hyperion</text>
    </g>
    <g data-system="Hyperion" class="planet overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Coalition_System_Pointer.png" x="240" y="860" width="40" height="40"/>
      <text x="260" y="912" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">Hyperion</text>
    </g>
    <g data-system="Omega 5" class="planet overlay trans_center" onclick="parent.system_click(this);">
      <image href="../00_Pointers/Coalition_System_Pointer.png" x="300" y="860" width="40" height="40"/>
      <text x="260" y="912" font-size="14" text-anchor="middle" fill="#dbdbdb" font-family="Freelancer">Omega 5</text>
    </g>
  </svg>
</div>

<div class="map_texts">
  <div data-system="Hyperion" class="txt coalition" onclick="parent.system_click(this);">Hyperion</div>
  <div data-system="Omega 5" class="txt coalition" onclick="parent.system_click(this);">Omega 5</div>
</div>

</body>
</html>
