<script>
const result = document.getElementById("result");
const dice = document.getElementById("dice");
const dice_img = document.getElementById("dice_img");
const farter = document.getElementById("farter");
const audioContext = new AudioContext();

async function loadFart() {
    const response = await fetch("farts/pitched/original_deep.mp3");
    const arrayBuffer = await response.arrayBuffer();
    fartBuffer = await audioContext.decodeAudioData(arrayBuffer);
}
const fartRates = [
    0.60, 0.65, 0.70, 0.75, 0.80,
    0.85, 0.90, 0.95, 1.00, 1.05,
    1.10, 1.15, 1.20, 1.25, 1.30,
    1.35, 1.40, 1.45, 1.50, 1.55,
    1.60, 1.65, 1.70, 1.75, 1.80,
    1.85, 1.90, 1.95, 2.00, 2.10
];

const randomSounds = [];
for (let i = 1; i <= 18; i++) {
    const file = String(i).padStart(2, "0");
    const audio = new Audio(`farts/random/${file}.mp3`);
    audio.preload = "auto";
    randomSounds.push(audio);
}

let rolling = false;
let rolledNumber = 0;         // aktuelle Würfelzahl
let pressesThisRound = 0;     // Furze in dieser Runde
let fartCounter = 0;          // zählt insgesamt die Furze
let targetFart = Math.floor(Math.random() * 30) + 1; // 1-30
let canFart = false;
let fartBuffer;

loadFart();
function playFart(rate = 1.0) {
  const source = audioContext.createBufferSource();
  source.buffer = fartBuffer;
  source.playbackRate.value = rate;
  source.connect(audioContext.destination);
  source.start();
}

dice.addEventListener("click", () => {
  if (rolling) return;
  rolling = true;
  dice_img.classList.add("rolling");
  result.textContent = "Würfeln...";
  
  const animationInterval = setInterval(() => {
    const randomNumber = Math.floor(Math.random() * 7) + 0;
    dice_img.src = `dices/${randomNumber}.png`;
  }, 200);
  
  setTimeout(() => {
    clearInterval(animationInterval);
    const finalNumber = Math.floor(Math.random() * 7) + 0;
    dice_img.src = `dices/${finalNumber}.png`;
    dice_img.classList.remove("rolling");
    rolling = false;
    rolledNumber = finalNumber;
    pressesThisRound = 0;
    if (finalNumber == 0) {canFart = false;result.textContent = `Du darfst Aussetzen!`;}
    else {canFart = true;result.textContent = `Du musst ${finalNumber} mal furzen!`;}
  }, 2000);
});

farter.addEventListener("click", () => {
  farter_img.classList.add("pressed");
  setTimeout(() => {farter_img.classList.remove("pressed");}, 200);
  if (audioContext.state === "suspended") {audioContext.resume();}
  console.log(fartCounter);
  if (canFart == false && fartCounter == 0) {
    const randomIndex = Math.floor(Math.random() * 18);
    randomSounds[randomIndex].currentTime = 0;
    randomSounds[randomIndex].play();
    return;
  }
  if (!canFart) return;
  fartCounter++;
  pressesThisRound++;
  
  const soundNumber = String(fartCounter).padStart(2, "0");
  const remaining = rolledNumber - pressesThisRound;
  const rate = 0.7 + fartCounter * 0.04;
  
  if (fartCounter === targetFart) {
    const randomIndex = Math.floor(Math.random() * 18);
    result.textContent = "💥 BOOM! Runde verloren!";
    randomSounds[randomIndex].currentTime = 0;
    randomSounds[randomIndex].play();
    
    fartCounter = 0;
    rolledNumber = 0;
    pressesThisRound = 0;
    canFart = false;
    targetFart = Math.floor(Math.random() * 30) + 1;
    console.log("Neue Zielzahl:", targetFart);
    return;
  }
  
  if (remaining > 0) {result.textContent = `Noch ${remaining} mal furzen!`;}
  if (pressesThisRound >= rolledNumber) {canFart = false;result.textContent = "Nächster Spieler!";}

  playFart(rate);
  console.log(`Furz ${fartCounter} / Rundendruck ${pressesThisRound}/${rolledNumber}`);
});
</script>
