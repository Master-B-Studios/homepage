<!DOCTYPE html>
<html>
  <head>
  <title>Mister Furz</title>
  <meta charset="utf-8"></meta>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"></meta>
  <link rel="icon" type="image/x-icon" href="../../images/MB_Icon_01.png"></link>

  <style>
    #result {width: 100%;height: auto;font-size: 1.6em;}
    
    #dice {width: 100%;height: 8em;}
    #dice_img {width: auto;height: 100%;}
    .rolling {animation: shake 0.8s infinite;}
    @keyframes shake {
        0%   { transform: rotate(-10deg); }
        25%  { transform: rotate(10deg); }
        50%  { transform: rotate(-10deg); }
        75%  { transform: rotate(10deg); }
        100% { transform: rotate(-10deg); }
    }
    
    #farter {width: 100%;height: auto;}
    #farter_img{width: 70%;height: auto;transition: all 0.5s;}
    #farter_img.pressed {transform: scale(0.9);}
  </style>
</head>

      <a href="../../index.html"><img class="mb_icon" src="../../images/MB_Icon_02.png"></img><span>Home</span></a>

      <article id="mrfurz" class="panel center">
        <section>
          <div id="dice"><img id="dice_img" src="dices/6.png"></div>
          <div class="tr_flipper_gap"></div>
          <div id="result">Klicke auf den 🎲</div>
        </section>
        <section>
          <div id="farter"><img id="farter_img" src="klicker/klicker.png"></div>
          <div class="tr_flipper_gap"></div>

<script src="../../assets/js/jquery.min.js"></script>
<script src="../../assets/js/browser.min.js"></script>
<script src="../../assets/js/breakpoints.min.js"></script>
<script src="../../assets/js/util.js"></script>
<script src="../../assets/js/main.js"></script>

<script>
const result = document.getElementById("result");
const dice = document.getElementById("dice");
const dice_img = document.getElementById("dice_img");
const farter = document.getElementById("farter");
const pitchedSounds = [];
const randomSounds = [];
// 01-30
for (let i = 1; i <= 30; i++) {
    const file = String(i).padStart(2, "0");
    const audio = new Audio(`farts/pitched/${file}.mp3`);
    audio.preload = "auto";
    pitchedSounds.push(audio);
}
// 001-119
for (let i = 1; i <= 119; i++) {
    const file = String(i).padStart(3, "0");
    const audio = new Audio(`farts/random/${file}.mp3`);
    audio.preload = "auto";
    randomSounds.push(audio);
}

let rolling = false;
let rolledNumber = 0;         // aktuelle Würfelzahl
let pressesThisRound = 0;     // Furze in dieser Runde
let fartCounter = 0;          // zählt insgesamt die Furze
let targetFart = Math.floor(Math.random() * 30) + 1; // 1-30
let canFart = false;

dice.addEventListener("click", () => {
  if (rolling) return;
  rolling = true;
  dice_img.classList.add("rolling");
  result.textContent = "Würfeln...";
  
  const animationInterval = setInterval(() => {
    const randomNumber = Math.floor(Math.random() * 6) + 1;
    dice_img.src = `dices/${randomNumber}.png`;
  }, 200);
  
  setTimeout(() => {
    clearInterval(animationInterval);
    const finalNumber = Math.floor(Math.random() * 6) + 1;
    dice_img.src = `dices/${finalNumber}.png`;
    dice_img.classList.remove("rolling");
    result.textContent = `Du musst ${finalNumber} mal furzen!`;
    rolling = false;

    rolledNumber = finalNumber;
    pressesThisRound = 0;
    canFart = true;
  }, 2000);
});

farter.addEventListener("click", () => {
  farter_img.classList.add("pressed");
  setTimeout(() => {farter_img.classList.remove("pressed");}, 200);
  
  if (!canFart) return;
  fartCounter++;
  pressesThisRound++;
  
  const soundNumber = String(fartCounter).padStart(2, "0");
  const remaining = rolledNumber - pressesThisRound;
  
  if (fartCounter === targetFart) {
    const randomIndex = Math.floor(Math.random() * 119);
    result.textContent = "💥 BOOM! Runde verloren!";
    randomSounds[randomIndex].currentTime = 0;
    randomSounds[randomIndex].play();
    
    fartCounter = 0;
    rolledNumber = 0;
    pressesThisRound = 0;
    canFart = false;
    targetFart = Math.floor(Math.random() * 30) + 1;
    console.log("Neue Zielzahl:", targetFart);
    return;
  }
  
  if (remaining > 0) {result.textContent = `Noch ${remaining} mal furzen!`;}
  if (pressesThisRound >= rolledNumber) {canFart = false;result.textContent = "Nächster Spieler!";}
  
  pitchedSounds[soundNumber - 1].currentTime = 0;
  pitchedSounds[soundNumber - 1].play();
  console.log(`Furz ${fartCounter} / Rundendruck ${pressesThisRound}/${rolledNumber}`);
});
</script>
