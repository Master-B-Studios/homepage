          </tr>
        </table>
        <h1>Phase 10</h1>

<input id="name" placeholder="Spielername">
<button onclick="addPlayer()">Spieler hinzufügen</button>
<button onclick="addRound()">Neue Runde</button>

<h2 id="winner"></h2>

<script src="../../assets/js/jquery.min.js"></script>
<script src="../../assets/js/browser.min.js"></script>
<script src="../../assets/js/breakpoints.min.js"></script>
<script src="../../assets/js/util.js"></script>
<script src="../../assets/js/main.js"></script>

<script>
  function getData() {
  return JSON.parse(localStorage.getItem("phase10")) || { players: [], finished: false };
}

function saveData(data) {
  localStorage.setItem("phase10", JSON.stringify(data));
}

function addPlayer() {
  const name = document.getElementById("name").value;
  if (!name) return;

  const data = getData();
  data.players.push({
    name,
    phase: 1,
    rounds: []
  });

  saveData(data);
  render();
}

function addRound() {
  const data = getData();
  if (data.finished) return;

  data.players.forEach(p => {
    p.rounds.push({ points: 0, phaseCompleted: false });
  });

  saveData(data);
  render();
}

function updatePoints(playerIndex, roundIndex, value) {
  const data = getData();
  data.players[playerIndex].rounds[roundIndex].points = Number(value);
  saveData(data);
  render();
}

function togglePhase(playerIndex, roundIndex) {
  const data = getData();
  const player = data.players[playerIndex];
  const round = player.rounds[roundIndex];

  round.phaseCompleted = !round.phaseCompleted;

  if (round.phaseCompleted && player.phase < 10) {
    player.phase++;
  }

  checkGameEnd(data);
  saveData(data);
  render();
}

function getTotal(pointsArray) {
  return pointsArray.reduce((sum, r) => sum + (r.points || 0), 0);
}

function checkGameEnd(data) {
  if (data.players.some(p => p.phase === 10)) {
    data.finished = true;
  }
}

function getWinner(players) {
  let winner = players[0];
  players.forEach(p => {
    if (getTotal(p.rounds) < getTotal(winner.rounds)) {
      winner = p;
    }
  });
  return winner;
}

function render() {
  const data = getData();
  const container = document.getElementById("players");
  container.innerHTML = "";

  data.players.forEach((p, i) => {
    const total = getTotal(p.rounds);

    let roundsHTML = "";
    p.rounds.forEach((r, ri) => {
      roundsHTML += `
        <div class="round">
          Runde ${ri+1}:
          <input type="number" value="${r.points}"
            onchange="updatePoints(${i}, ${ri}, this.value)">
          Phase geschafft:
          <input type="checkbox" ${r.phaseCompleted ? "checked" : ""}
            onchange="togglePhase(${i}, ${ri})">
        </div>
      `;
    });

    container.innerHTML += `
      <div class="player">
        <strong>${p.name}</strong><br>
        Phase: ${p.phase}<br>
        Gesamtpunkte: ${total}
        ${roundsHTML}
      </div>
    `;
  });

  if (data.finished) {
    const winner = getWinner(data.players);
    document.getElementById("winner").innerText =
      "🏆 Gewinner: " + winner.name;
  }
}

render();
</script>
